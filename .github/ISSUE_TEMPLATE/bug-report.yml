name: Bug Report
description: Report a issue.
title: "[BUG] SUMMARY"
labels: ["bug"]
body:
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Which platform is affected?
      options:
        - Ios
        - Android
        - Both
    validations:
      required: true

  - type: dropdown
    id: workspace
    attributes:
      label: Workspace
      description: Where are you using it?
      options:
        - Expo
        - CLI
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: How can someone else reproduce this bug?
    attributes:
      label: Reproduce
      description: Information on how to reproduce the problem.
