name: Bug Report
description: Report a issue.
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Version
      description: What version are you using?
      placeholder: 1.0.0
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Which platform is affected?
      options:
        - Ios
        - Android
        - Both
    validations:
      required: true

  - type: dropdown
    id: workspace
    attributes:
      label: Workspace
      description: Where are you using it?
      options:
        - Expo
        - CLI
    validations:
      required: true


  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
